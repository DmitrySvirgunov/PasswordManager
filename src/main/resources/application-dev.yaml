    ip-limit: ${APP_ANTI_ABUSE_IP_LIMIT:1000}
    ip-window-minutes: ${APP_ANTI_ABUSE_IP_WINDOW_MINUTES:1}
    login-email-limit: ${APP_ANTI_ABUSE_LOGIN_EMAIL_LIMIT:1000}
